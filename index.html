<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Drift - Liquid Glass Match-3 Game</title>
    <meta name="description" content="Experience Aether Drift, a high-end Match-3 game with a stunning Liquid Glass aesthetic, advanced physics, and progressive levels.">
    <meta name="keywords" content="Match-3, Game, Glassmorphism, HTML5, Canvas, Aether Drift">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Dynamic Gradient Background -->
        <div class="bg-gradient"></div>
        <div class="bg-overlay"></div>

        <!-- Login Portal -->
        <div id="login-portal" class="panel glass">
            <h1>Aether Drift</h1>
            <p>Enter the Void</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" spellcheck="false">
            </div>
            <button id="start-game" class="pulse-btn">Start Game</button>
        </div>

        <!-- In-Game HUD (hidden initially) -->
        <div id="game-hud" class="hidden">
            <div class="top-bar">
                <div class="level-info">
                    <span id="level-text">Level 1</span>
                </div>
                <button id="settings-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                    </svg>
                </button>
            </div>

            <div class="bottom-bar">
                <div class="score-container">
                    <span id="score-text">0</span>
                    <div class="progress-bar-wrap">
                        <div id="score-progress" class="liquid-fill"></div>
                    </div>
                    <span id="target-text">Target: 100</span>
                </div>
                <div class="moves-container">
                    <span id="moves-text">25</span>
                    <label>Moves</label>
                </div>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="panel glass hidden">
            <h2>Paused</h2>
            <button id="resume-btn" class="menu-btn">Resume</button>
            <button id="home-btn" class="menu-btn secondary">Home</button>
        </div>

        <!-- Level Complete / Game Over Cards -->
        <div id="result-card" class="slide-up hidden">
            <div class="card-content glass">
                <h2 id="result-title">Level Complete!</h2>
                <div id="star-rating" class="stars">
                    <span>★</span><span>★</span><span>★</span>
                </div>
                <p id="result-score">Score: 1200</p>
                <button id="next-level-btn" class="pulse-btn">Next Level</button>
                <button id="retry-btn" class="pulse-btn hidden">Retry</button>
            </div>
        </div>

        <!-- Game Canvas -->
        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
